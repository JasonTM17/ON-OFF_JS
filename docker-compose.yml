version: "3.9"

services:
  frontend:
    build: .
    image: nguyenson1710/onoff-frontend:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-}

  backend:
    build: .
    image: nguyenson1710/onoff-backend:latest
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/chat
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-}
    volumes:
      - db-data:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/search?q=test"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - n8n

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: nguyenson1710/onoff-nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:?N8N_USER must be set}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASS:?N8N_PASS must be set}
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
    volumes:
      - n8n-data:/home/node/.n8n

volumes:
  db-data:
  n8n-data:
