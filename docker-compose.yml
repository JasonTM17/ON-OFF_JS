version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-onfit-secret-key-2026}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/chat
    volumes:
      - db-data:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/search?q=test"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - n8n

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASS:-onfit2026}
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
    volumes:
      - n8n-data:/home/node/.n8n

volumes:
  db-data:
  n8n-data:
